apply plugin: 'com.android.application'

// Load signing properties
def signingProps = new Properties()
def propsFile = file('signing.properties')
if (propsFile.exists()) {
    signingProps.load(new FileInputStream(propsFile))
}

android {
    namespace = "com.suraksha.safety"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.suraksha.safety"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 201
        versionName "2.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (propsFile.exists()) {
                storeFile file(signingProps['STORE_FILE'])
                storePassword signingProps['STORE_PASSWORD']
                keyAlias signingProps['KEY_ALIAS']
                keyPassword signingProps['KEY_PASSWORD']
            }
        }
    }
    buildTypes {
        release {
            if (propsFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    setupAndroidTV()
    lintOptions {
        checkReleaseBuilds false
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def fileName = "Suraksha-v${variant.versionName}"
            if (output.outputFile.name.endsWith(".apk")) {
                outputFileName = "${fileName}.apk"
            }
        }
    }

    // For App Bundles (AAB)
    project.tasks.whenTaskAdded { task ->
        if (task.name.startsWith("bundle")) {
            def variantName = task.name.substring(6).toLowerCase()
            if (variantName.contains("release")) {
                task.doLast {
                    def bundleFile = file("${buildDir}/outputs/bundle/release/app-release.aab")
                    if (bundleFile.exists()) {
                        bundleFile.renameTo(file("${buildDir}/outputs/bundle/release/Suraksha-v${android.defaultConfig.versionName}.aab"))
                    }
                }
            }
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$rootProject.ext.androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$rootProject.ext.androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$rootProject.ext.coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.android.gms:play-services-location:21.0.1"
    implementation "androidx.car.app:app:1.4.0"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

def setupAndroidTV() {
    android {
        buildTypes {
            release {
                resValue "bool", "is_tv", "false"
            }
            debug {
                resValue "bool", "is_tv", "false"
            }
        }
    }
}
